<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>GeoExpert</title>
  <link rel="icon" href="https://9040401.fs1.hubspotusercontent-na1.net/hubfs/9040401/bainsymbol_dig_red_100x100px.webp" type="image/webp">
  <style>
    :root {
      --prism-red:        #E60028;
      --prism-red-dark:   #C20020;
      --prism-red-light:  #FFE5E9;
      --text-primary:     #1A1A1A;
      --text-secondary:   #555555;
      --text-muted:       #888888;
      --border:           #E5E5E5;
      --bg:               #F7F7F8;
      --bg-white:         #FFFFFF;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 2px 6px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.10);
      --success:    #00875A; --success-bg: #E3FCEF;
      --error:      #DE350B; --error-bg:   #FFEBE6;
      --pending:    #B85C00; --pending-bg: #FFF4E5;
      --radius:    8px; --radius-sm: 6px;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-primary);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    /* ---------- Header ---------- */
    .site-header { position: sticky; top: 0; z-index: 20; background:#FFFFFF; border-bottom:1px solid #E5E5E5; box-shadow:0 1px 2px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.06); }
    .header-inner { display:flex; align-items:center; justify-content:space-between; max-width:1200px; margin:0 auto; padding:14px 24px; gap:20px; }
    .brand { display:flex; align-items:center; gap:12px; }
    .brand-logo { height:34px; width:auto; display:block; }
    .brand-divider { width:1px; height:22px; background:#E5E5E5; flex-shrink:0; }
    .brand-title { font-size:1rem; font-weight:800; color:#1A1A1A; }
    .user-info { text-align:right; }
    .user-name-row { display:flex; align-items:center; justify-content:flex-end; gap:5px; font-size:0.9rem; color:#1A1A1A; }
    .verified-tick { width:15px; height:15px; color:#E60028; flex-shrink:0; }
    .user-email { display:flex; align-items:center; justify-content:flex-end; gap:6px; color:#E60028; font-size:0.82rem; font-weight:600; margin-top:2px; }
    .online-dot { width:8px; height:8px; border-radius:50%; background:#22C55E; box-shadow:0 0 0 3px rgba(34,197,94,0.25); animation:pulse-dot 1.3s ease-in-out infinite; flex-shrink:0; }
    @keyframes pulse-dot { 0%,100%{opacity:1;} 50%{opacity:0.35;} }

    /* ---------- Buttons ---------- */
    .btn-primary { background:#E60028; border:1px solid #E60028; color:#FFFFFF; font-weight:600; cursor:pointer; border-radius:var(--radius-sm); }
    .btn-primary:hover:not(:disabled) { background:#C20020; border-color:#C20020; box-shadow:0 4px 12px rgba(230,0,40,0.20); transform:translateY(-1px); }
    .btn-primary:disabled { opacity:0.5; cursor:not-allowed; }

    input[type="checkbox"] { accent-color:#E60028; }

    /* ---------- Chat scroll area ---------- */
    .chat-scroll {
      flex: 1 1 auto;
      overflow-y: auto;
      scrollbar-color:#E60028 #F7F7F8;
    }
    .chat-scroll::-webkit-scrollbar { width:8px; }
    .chat-scroll::-webkit-scrollbar-track { background:#F7F7F8; }
    .chat-scroll::-webkit-scrollbar-thumb { background:#E60028; border-radius:8px; }

    .chat-inner {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 20px 32px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-height: 100%;
    }

    /* ---------- Empty state ---------- */
    .empty-state {
      margin: auto;
      text-align: center;
      padding: 24px 8px;
      max-width: 640px;
    }
    .empty-state .geo-mark {
      font-size: 2.6rem;
      line-height: 1;
      margin-bottom: 14px;
    }
    .empty-state h1 {
      font-size: 1.4rem;
      font-weight: 800;
      margin: 0 0 8px;
      color: var(--text-primary);
    }
    .empty-state p {
      margin: 0 0 22px;
      color: var(--text-secondary);
      font-size: 0.95rem;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .chip {
      background: var(--bg-white);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 0.88rem;
      font-family: inherit;
      cursor: pointer;
      transition: color .15s, border-color .15s, box-shadow .15s, transform .15s;
    }
    .chip:hover {
      color: var(--prism-red);
      border-color: var(--prism-red);
      box-shadow: var(--shadow-sm);
      transform: translateY(-1px);
    }

    /* ---------- Message bubbles ---------- */
    .msg { display: flex; flex-direction: column; max-width: 100%; }
    .msg.user { align-items: flex-end; }
    .msg.assistant { align-items: flex-start; }

    .bubble {
      max-width: 88%;
      padding: 12px 15px;
      border-radius: 14px;
      font-size: 0.95rem;
      word-wrap: break-word;
      overflow-wrap: anywhere;
    }

    .msg.user .bubble {
      background: #FFE5E9;
      color: #1A1A1A;
      border-bottom-right-radius: 4px;
    }

    .msg.assistant .bubble {
      background: #FFFFFF;
      border: 1px solid #E5E5E5;
      box-shadow: var(--shadow-sm);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
    }

    .assistant-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--prism-red);
      margin: 0 0 5px 4px;
      text-transform: none;
    }

    .bubble.error {
      background: var(--error-bg) !important;
      border-color: var(--error) !important;
      color: var(--error) !important;
    }

    /* Markdown content inside bubbles */
    .bubble > *:first-child { margin-top: 0; }
    .bubble > *:last-child { margin-bottom: 0; }
    .bubble p { margin: 0 0 10px; }
    .bubble h1, .bubble h2, .bubble h3 { margin: 14px 0 8px; line-height: 1.3; font-weight: 700; }
    .bubble h1 { font-size: 1.15rem; }
    .bubble h2 { font-size: 1.08rem; }
    .bubble h3 { font-size: 1rem; }
    .bubble ul, .bubble ol { margin: 0 0 10px; padding-left: 22px; }
    .bubble li { margin: 3px 0; }
    .bubble strong { font-weight: 700; }
    .bubble em { font-style: italic; }
    .bubble code.inline {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      background: #F2F2F4;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 0.86em;
    }
    .bubble pre {
      background: #F2F2F4;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      overflow-x: auto;
      margin: 0 0 10px;
    }
    .bubble pre code {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.85rem;
      background: none;
      border: none;
      padding: 0;
      color: var(--text-primary);
    }

    /* Typing indicator */
    .typing { display: inline-flex; align-items: center; gap: 5px; padding: 4px 2px; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--prism-red);
      opacity: 0.4;
      animation: typing-bounce 1.2s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: 0.18s; }
    .typing span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes typing-bounce {
      0%, 60%, 100% { opacity: 0.35; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-4px); }
    }

    /* ---------- Input bar ---------- */
    .input-bar {
      flex-shrink: 0;
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    }
    .input-inner {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 8px 8px 8px 16px;
      box-shadow: var(--shadow-sm);
      transition: border-color .15s, box-shadow .15s;
    }
    .input-inner:focus-within {
      border-color: var(--prism-red);
      box-shadow: 0 0 0 3px rgba(230,0,40,0.12);
    }
    #composer {
      flex: 1 1 auto;
      border: none;
      outline: none;
      resize: none;
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.45;
      color: var(--text-primary);
      background: transparent;
      max-height: 132px; /* ~5 lines */
      overflow-y: auto;
      padding: 6px 0;
    }
    #composer::placeholder { color: var(--text-muted); }

    .send-btn {
      flex-shrink: 0;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, border-color .15s, box-shadow .15s, transform .15s;
    }
    .send-btn svg { width: 18px; height: 18px; display: block; }

    /* ---------- Mobile ---------- */
    @media (max-width: 640px) {
      .header-inner { padding: 12px 16px; }
      .brand-logo { height: 28px; }
      .user-email { display: none; }
      .bubble { max-width: 92%; }
      .chat-inner { padding: 18px 14px 26px; }
    }
  </style>
</head>
<body>

    <div class="header-inner">
      <div class="brand">
        <img class="brand-logo"

  </header>

  <main class="chat-scroll" id="chatScroll">
    <div class="chat-inner" id="chatInner">
      <div class="empty-state" id="emptyState">
        <div class="geo-mark" aria-hidden="true">🌍</div>
        <h1>Ask Dr. Strata anything about earth science</h1>
        <p>Mineralogy, plate tectonics, volcanoes, petroleum, earthquakes — 30+ years of field and academic geology, at your service.</p>
        <div class="chips" id="chips">
          <button class="chip" type="button">How do sedimentary rocks form?</button>
          <button class="chip" type="button">What causes earthquakes?</button>
          <button class="chip" type="button">Explain the rock cycle</button>
          <button class="chip" type="button">How is oil trapped underground?</button>
        </div>
      </div>
    </div>
  </main>

  <div class="input-bar">
    <div class="input-inner">
      <textarea id="composer" rows="1" placeholder="Ask the geologist…" autocomplete="off"></textarea>
      <button class="btn-primary send-btn" id="sendBtn" type="button" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M4 12L20 4L13 20L11 13L4 12Z" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    "use strict";

    // ---------- State & elements ----------
    const messages = []; // { role: "user" | "assistant", content: string }
    let streaming = false;

    const chatScroll = document.getElementById("chatScroll");
    const chatInner  = document.getElementById("chatInner");
    const emptyState = document.getElementById("emptyState");
    const composer   = document.getElementById("composer");
    const sendBtn    = document.getElementById("sendBtn");

        .replace(/'/g, "&#39;");
    }

    function renderInline(text) {

      const codes = [];
      text = text.replace(/`([^`]+)`/g, (_, c) => {
